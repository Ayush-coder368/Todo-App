<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-App</title>
    <meta name="description"
        content="A simple and smart task manager to organize your work, track progress, and manage your daily tasks efficiently. Create, update, and complete tasks with an easy drag-and-drop interface." />
    <link rel="shortcut icon" href="todo.jpg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <nav>
            <div class="left">iTask-Your Task Manager</div>
            <div class="right"><button class="toggle-modal">Add New Task</button></div>
        </nav>
        <section class="board">
            <div id="todo" class="task-column">
                <div class="heading">
                    <div class="left">To Do</div>
                    <div class="right">Count</div>
                </div>
            </div>
            <div id="progress" class="task-column">
                <div class="heading">
                    <div class="left">In Progress</div>
                    <div class="right">Count</div>
                </div>
            </div>
            <div id="done" class="task-column">
                <div class="heading">
                    <div class="left">Completed</div>
                    <div class="right">Count</div>
                </div>
            </div>
        </section>
    </main>
    <div class="modal add-new-task">
        <div class="bg"></div>
        <div class="center">
            <input id="task-title-input" type="text" placeholder="Your Task">
            <textarea id="task-desc-input" placeholder="Task Description"></textarea>
            <button id="add-task" class="add-task-btn">Add Task</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
